services:
  aniverse-backend:
    image: ghcr.io/vishalwadg/aniverse-backend:latest # Pulls pre-built image
    restart: always
    environment:
      # Explicitly cap Java memory so it doesn't crash the free-tier AWS VPS
      JAVA_TOOL_OPTIONS: -Xmx512m
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_KEY: ${CLOUDINARY_KEY}
      CLOUDINARY_SECRET: ${CLOUDINARY_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
  aniverse-frontend:
    image: ghcr.io/vishalwadg/aniverse-frontend:latest # Pulls pre-built image
    restart: always
    ports:
      - "80:8080" # Maps host HTTP port 80 to container port 8080