spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: AniverseBackend
    version: ${APP_VERSION:unknown-local}
  
  jackson:
    deserialization:
      fail-on-unknown-properties: true

# spring.sql.init.data-locations=classpath:data.sql
server:
  servlet:
    context-path: /api/v1

# spring.sql.init.mode=always
jwt:
  secretKey: ${JWT_SECRET}

# Access Token: 15 minutes (in ms)
application:
  security:
    jwt:
      expiration-ms: ${ACCESS_TOKEN_EXPIRATION_MS:900000}
# Refresh Token: 7 days (in ms)
      refresh-token:
        expiration-ms: ${REFRESH_TOKEN_EXPIRATION_MS:604800000}
        absolute-expiration-ms: ${REFRESH_TOKEN_ABSOLUTE_EXPIRATION_MS:2592000000}
  
  posts:
    retention:
      days: ${POST_RETENTION_DAYS:30}
      purge-cron: ${POST_RETENTION_PURGE_CRON:0 0 3 * * *}
      purge-zone: ${POST_RETENTION_PURGE_ZONE:UTC}

# cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_KEY}
  api-secret: ${CLOUDINARY_SECRET}
  folder-name: ${CLOUDINARY_FOLDER_NAME:aniverse_posts}

