# ===================================================================
# TEST CONFIGURATION (Used only during CI/CD and 'mvn test')
# ===================================================================

# 1. Use H2 In-Memory Database instead of MySQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. Tell Hibernate to use H2 SQL dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# 3. Disable your data.sql file for tests (prevents MySQL syntax errors in H2)
spring.sql.init.mode=never

# 4. Dummy JWT Secret just so the context loads without crashing
jwt.secretKey=${JWT_SECRET:adasfasd3424@#$@#wruwJj3@#djfsk#ioriw,.vxv2343#$@dfdljk#}

# Access Token: 15 minutes (in ms)
application.security.jwt.expiration-ms=900000
# Refresh Token: 7 days (in ms)
application.security.jwt.refresh-token.expiration-ms=604800000
application.security.jwt.refresh-token.absolute-expiration-ms=2592000000

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174