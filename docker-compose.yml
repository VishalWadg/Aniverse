services:
  redis:
    image: redis:alpine
    container_name: aniverse-redis
    volumes:
      - redis_data:/data
    networks:
      - aniverse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  aniverse-backend:
    container_name: aniverse-backend
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aniverse-network

  aniverse-frontend:
    container_name: aniverse-frontend
    depends_on:
      - aniverse-backend
    networks:
      - aniverse-network

networks:
  aniverse-network:
    driver: bridge

volumes:
  redis_data: