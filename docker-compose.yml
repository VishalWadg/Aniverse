version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: aniverse-redis
    volumes:
      - redis_prod_data:/data
    networks:
      - aniverse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  aniverse-backend:
    image: ghcr.io/vishalwadg/aniverse-backend:latest
    container_name: aniverse-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_KEY: ${CLOUDINARY_KEY}
      CLOUDINARY_SECRET: ${CLOUDINARY_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - aniverse-network
    restart: unless-stopped

  aniverse-frontend:
    image: ghcr.io/vishalwadg/aniverse-frontend:latest
    container_name: aniverse-frontend
    ports:
      - "80:80"
    depends_on:
      - aniverse-backend
    networks:
      - aniverse-network
    restart: unless-stopped

networks:
  aniverse-network:
    driver: bridge

volumes:
  redis_prod_data: