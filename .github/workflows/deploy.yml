name: CI/CD Pipeline & Deploy to AWS

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Set up Java Environment
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 2. Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Build & Push Backend Jib Image directly to GHCR
      - name: Build and Push Backend Jib Image
        run: |
          cd Backend
          chmod +x mvnw
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          ./mvnw compile jib:build \
            -Dimage=ghcr.io/${REPO_LOWER}-backend:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GITHUB_TOKEN }}

      # 4. Set up Docker Buildx for Frontend Build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Build & Push Frontend Docker Image to GHCR
      - name: Build and Push Frontend Image
        run: |
          cd Frontend
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker buildx build \
            --file Dockerfile \
            --tag ghcr.io/${REPO_LOWER}-frontend:latest \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (needed to access docker-compose.yml and docker-compose.prod.yml)
        uses: actions/checkout@v4

      # 1. Securely copy both the docker-compose.yml and docker-compose.prod.yml files to the server first
      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml" # <-- Copies both files
          target: "~/aniverse-production"

      # 2. Run the SSH commands to start the containers
      - name: SSH and deploy to AWS VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/aniverse-production
            
            # Dynamically generate the .env file and strip leading indentation spaces using sed
            cat <<'EOF' | sed 's/^[ \t]*//' > .env
            SPRING_PROFILES_ACTIVE=prod
            ALLOWED_ORIGINS=http://${{ secrets.VPS_PUBLIC_IP }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            REDIS_HOST=redis
            REDIS_PORT=6379
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_KEY=${{ secrets.CLOUDINARY_KEY }}
            CLOUDINARY_SECRET=${{ secrets.CLOUDINARY_SECRET }}
            VITE_API_BASE_URL=http://${{ secrets.VPS_PUBLIC_IP }}/api
            EOF
            
            # Log in to GHCR using the permanent Personal Access Token
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull and restart the stack using merged files (ignores dev override)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            
            # Clean up disk space to prevent the 30GB EBS volume from filling up
            docker image prune -f