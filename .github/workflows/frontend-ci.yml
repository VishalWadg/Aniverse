name: Aniverse Frontend CI

on:
  push:
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  build-frontend:
    name: Build React App
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./Frontend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './Frontend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Build the app
      run: npm run build

      # Forcing GitHub to recognize the pipeline
