services:
  postgres:
    image: postgres:15-alpine
    container_name: aniverse-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Akadan10}
      POSTGRES_DB: ${DB_NAME:-aniverse}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aniverse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  aniverse-backend:
    build: ./Backend # Compiles local Java sources on demand
    ports:
      - "8080:8080"
    env_file:
      - ./Backend/.env # Loads all Cloudinary, JWT, and DB credentials directly
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/aniverse # Overrides the localhost URL in Backend/.env
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-Akadan10}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  aniverse-frontend:
    build: ./Frontend # Compiles local React sources on demand
    ports:
      - "80:8080" # Maps port 80 of host to non-root 8080 of container

volumes:
  postgres_data: